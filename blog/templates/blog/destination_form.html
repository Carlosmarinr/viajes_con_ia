{% extends 'blog/base.html' %}
{% block content %}
<div class="container form-card">
    <h2>{{ title }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button">Guardar</button>
    </form>
</div>
{% endblock %}
