<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Venezuela Travel Blog</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/styles.css' %}">
</head>
<body>
    <header class="hero">
        <nav class="nav-bar">
            <a class="brand" href="{% url 'home' %}">🌋 Viajes por Venezuela</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Inicio</a>
                <a href="{% url 'destination_list' %}">Destinos</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'destination_create' %}">Agregar destino</a>
                    <a href="{% url 'logout' %}">Salir</a>
                {% else %}
                    <a href="{% url 'login' %}">Entrar</a>
                    <a href="{% url 'signup' %}">Registrarse</a>
                {% endif %}
            </div>
        </nav>
        <div class="hero-content">
            <h1>Descubre Venezuela, un país de paisajes únicos</h1>
            <p>Explora aventuras, playas, montañas y culturas en cada rincón.</p>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
