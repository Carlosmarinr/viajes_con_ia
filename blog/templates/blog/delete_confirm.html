{% extends 'blog/base.html' %}
{% block content %}
<div class="container form-card">
    <h2>Eliminar destino</h2>
    <p>¿Seguro que deseas eliminar <strong>{{ destination.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="button danger">Sí, eliminar</button>
        <a class="button" href="{% url 'destination_detail' slug=destination.slug %}">Cancelar</a>
    </form>
</div>
{% endblock %}
